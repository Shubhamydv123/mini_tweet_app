{% extends "layout.html" %}
{% block title %}
Chai aur Tweet
{% endblock %}

{% block content %}
  <h1 class="text-center mt-4">Welcome to Mini Tweet App </h1>

  <h2 class = "text-center mt-4">{% if form.instance.pk %}Edit Tweet{% else %}Create New Tweet{% endif %}
  <form method="post" enctype="multipart/form-data" class="form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-warning" type="submit">submit</button> 
  </form>
  <a href="{% url 'tweet_list' %}" >Back to tweet list</a>
  </h2> 
{% endblock %}
